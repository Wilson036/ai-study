<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 應用規劃師（中級）｜科目一 互動學習</title>
<style>
:root{
  --bg:#f5f7fa; --panel:#ffffff; --ink:#1f2933; --ink-soft:#52606d; --ink-mute:#7b8794;
  --line:#e4e9f0; --line-soft:#eef2f7;
  --primary:#2563eb; --primary-d:#1d4ed8; --primary-soft:#e8effd;
  --teal:#0e9384; --teal-soft:#e2f5f1;
  --amber:#d97706; --amber-soft:#fef3e2;
  --green:#16a34a; --green-soft:#e7f6ec; --red:#dc2626; --red-soft:#fdeaea;
  --shadow:0 1px 2px rgba(16,24,40,.04),0 4px 16px rgba(16,24,40,.06);
  --shadow-lg:0 8px 30px rgba(16,24,40,.12);
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",
    "Segoe UI",Roboto,"Helvetica Neue",sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.7;
  -webkit-font-smoothing:antialiased; letter-spacing:.01em;
}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
::selection{background:var(--primary-soft)}

/* ---------- Header ---------- */
header.top{
  position:sticky; top:0; z-index:40;
  background:linear-gradient(110deg,#1e3a8a 0%,#2563eb 45%,#0e9384 110%);
  color:#fff; padding:0; box-shadow:0 2px 14px rgba(16,24,40,.16);
}
.top-inner{max-width:1280px; margin:0 auto; padding:14px 22px}
.brand{display:flex; align-items:center; gap:13px}
.logo{
  width:42px;height:42px;border-radius:11px;flex:none;
  background:rgba(255,255,255,.16); backdrop-filter:blur(4px);
  display:grid;place-items:center; font-weight:800; font-size:17px; letter-spacing:-.5px;
  border:1px solid rgba(255,255,255,.25);
}
.brand h1{font-size:18px; font-weight:700; letter-spacing:.02em}
.brand p{font-size:12.5px; opacity:.86; font-weight:400; margin-top:1px}
.tabs{display:flex; gap:6px; margin-top:14px; flex-wrap:wrap}
.tab{
  display:flex;align-items:center;gap:7px;
  padding:8px 16px; border-radius:10px; font-size:14px; font-weight:600;
  color:rgba(255,255,255,.82); background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.14); transition:.16s;
}
.tab:hover{background:rgba(255,255,255,.18); color:#fff}
.tab.active{background:#fff; color:var(--primary-d); border-color:#fff; box-shadow:0 3px 10px rgba(0,0,0,.12)}
.tab .ic{font-size:15px}

/* ---------- Layout ---------- */
.wrap{max-width:1280px; margin:0 auto; padding:22px; display:grid; grid-template-columns:268px 1fr; gap:22px; align-items:start}
aside{position:sticky; top:108px; max-height:calc(100vh - 130px); overflow:auto; display:flex; flex-direction:column; gap:14px}
aside::-webkit-scrollbar{width:7px} aside::-webkit-scrollbar-thumb{background:#d3dae3;border-radius:8px}
.side-card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden}
.side-card h3{font-size:12px; text-transform:uppercase; letter-spacing:.09em; color:var(--ink-mute); padding:14px 16px 9px; font-weight:700}

/* search */
.search-box{padding:12px}
.search-field{position:relative}
.search-field input{
  width:100%; padding:11px 14px 11px 38px; border:1.5px solid var(--line); border-radius:10px;
  font-size:14px; background:#fbfcfe; transition:.15s; color:var(--ink);
}
.search-field input:focus{outline:none; border-color:var(--primary); background:#fff; box-shadow:0 0 0 3px var(--primary-soft)}
.search-field .si{position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--ink-mute); font-size:14px}
.search-results{margin-top:8px; display:flex; flex-direction:column; gap:4px}
.sr-item{padding:9px 11px; border-radius:9px; cursor:pointer; border:1px solid transparent; transition:.12s}
.sr-item:hover{background:var(--primary-soft); border-color:#d3e2fb}
.sr-tag{font-size:11px; font-weight:700; color:var(--primary); margin-bottom:1px}
.sr-txt{font-size:13px; color:var(--ink-soft)}
.sr-txt b{background:#fff3bf; color:#7a5b00; padding:0 1px; border-radius:2px}
.sr-empty{padding:8px 11px; font-size:13px; color:var(--ink-mute)}

/* nav */
.nav{padding:6px 10px 12px}
.nav-chap{margin-top:6px}
.nav-chap-h{display:flex; align-items:center; gap:8px; padding:8px 8px 6px; font-size:13px; font-weight:700; color:var(--ink)}
.chap-badge{width:22px;height:22px;border-radius:7px;display:grid;place-items:center;font-size:12px;font-weight:800;color:#fff;flex:none}
.c3{background:#2563eb}.c4{background:#0e9384}.c5{background:#7c3aed}
.nav-sec{
  display:flex; align-items:center; gap:9px; width:100%; text-align:left;
  padding:8px 10px 8px 12px; border-radius:9px; font-size:13.5px; color:var(--ink-soft);
  transition:.13s; border:1px solid transparent;
}
.nav-sec:hover{background:var(--line-soft); color:var(--ink)}
.nav-sec.active{background:var(--primary-soft); color:var(--primary-d); font-weight:700; border-color:#d3e2fb}
.nav-sec .num{font-size:12px; font-weight:700; opacity:.7; min-width:24px}
.nav-divider{height:1px;background:var(--line-soft);margin:8px 6px}
.side-stat{padding:11px 16px 15px; font-size:12.5px; color:var(--ink-mute)}
.side-stat b{color:var(--ink); font-weight:700}

/* ---------- Main ---------- */
main{min-width:0}
.panel{background:var(--panel); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); padding:30px 34px}
@media(max-width:560px){.panel{padding:22px 18px}}

/* notes */
.sec-head{border-bottom:1px solid var(--line-soft); padding-bottom:18px; margin-bottom:22px}
.sec-eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:var(--primary);
  background:var(--primary-soft); padding:4px 11px; border-radius:20px; margin-bottom:11px}
.sec-head h2{font-size:25px; font-weight:800; letter-spacing:.01em; line-height:1.35}
.sec-summary{margin-top:13px; font-size:15px; color:var(--ink-soft); background:linear-gradient(180deg,#fbfcff,#f7faff);
  border:1px solid var(--line-soft); border-left:4px solid var(--primary); border-radius:10px; padding:14px 17px}

.block-label{display:flex;align-items:center;gap:9px;font-size:15.5px;font-weight:800;color:var(--ink);margin:28px 0 14px}
.block-label .bar{width:4px;height:17px;border-radius:3px;background:var(--primary)}
.block-label.teal .bar{background:var(--teal)} .block-label.amber .bar{background:var(--amber)}

.kp-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px}
@media(max-width:760px){.kp-grid{grid-template-columns:1fr}}
.kp{background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 16px; transition:.15s; position:relative; overflow:hidden}
.kp:hover{box-shadow:var(--shadow); border-color:#cdd9ea; transform:translateY(-1px)}
.kp::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--primary);opacity:.0;transition:.15s}
.kp:hover::before{opacity:.85}
.kp h4{font-size:14.5px; font-weight:700; color:var(--ink); margin-bottom:5px; display:flex; gap:8px; align-items:baseline}
.kp h4 .dot{width:6px;height:6px;border-radius:50%;background:var(--primary);flex:none;transform:translateY(-2px)}
.kp p{font-size:13.5px; color:var(--ink-soft)}

.tbl-wrap{overflow-x:auto; border:1px solid var(--line); border-radius:12px; margin-bottom:8px}
table.t{width:100%; border-collapse:collapse; font-size:13.5px; min-width:460px}
table.t caption{caption-side:top; text-align:left; font-weight:700; font-size:14px; padding:12px 14px 4px; color:var(--ink)}
table.t th{background:#f1f5fb; color:var(--ink); font-weight:700; text-align:left; padding:10px 13px; border-bottom:2px solid #dde6f2; font-size:13px; white-space:nowrap}
table.t td{padding:9px 13px; border-bottom:1px solid var(--line-soft); color:var(--ink-soft); vertical-align:top}
table.t tr:last-child td{border-bottom:none}
table.t tbody tr:nth-child(even){background:#fafbfd}
table.t tbody tr:hover{background:var(--primary-soft)}

.term-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:760px){.term-grid{grid-template-columns:1fr}}
.term{display:flex;gap:11px;background:var(--teal-soft);border:1px solid #cdeae3;border-radius:11px;padding:11px 14px}
.term .tk{font-weight:700;color:#0b6e63;font-size:14px}
.term .te{font-size:11.5px;color:#3f8d82;font-weight:600}
.term .td{font-size:12.5px;color:var(--ink-soft);margin-top:2px}

.sec-nav{display:flex;justify-content:space-between;gap:12px;margin-top:30px;padding-top:20px;border-top:1px solid var(--line-soft)}
.sec-nav button{display:flex;flex-direction:column;gap:2px;padding:11px 18px;border:1px solid var(--line);border-radius:11px;background:#fff;transition:.15s;max-width:48%}
.sec-nav button:hover:not(:disabled){border-color:var(--primary);background:var(--primary-soft);color:var(--primary-d)}
.sec-nav button:disabled{opacity:.38;cursor:default}
.sec-nav .lbl{font-size:11px;color:var(--ink-mute);font-weight:600}
.sec-nav .ttl{font-size:13.5px;font-weight:700}
.sec-nav .right{text-align:right;align-items:flex-end}

/* ---------- Flashcards ---------- */
.fc-toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;margin-bottom:20px}
.chip-row{display:flex;gap:7px;flex-wrap:wrap}
.chip{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);transition:.14s}
.chip:hover{border-color:var(--primary)}
.chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.fc-tools{display:flex;gap:8px}
.btn-ghost{padding:8px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:13px;font-weight:600;background:#fff;color:var(--ink-soft);transition:.14s;display:flex;align-items:center;gap:6px}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary)}

.fc-stage{perspective:1600px; margin:0 auto; max-width:620px}
.flashcard{position:relative; width:100%; min-height:300px; cursor:pointer; transition:transform .55s cubic-bezier(.4,.2,.2,1); transform-style:preserve-3d}
.flashcard.flip{transform:rotateY(180deg)}
.fc-face{position:absolute; inset:0; backface-visibility:hidden; border-radius:18px; padding:32px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; box-shadow:var(--shadow-lg)}
.fc-front{background:linear-gradient(150deg,#ffffff,#f3f7ff); border:1px solid var(--line)}
.fc-front .meta{position:absolute;top:16px;left:18px;font-size:11.5px;font-weight:700;color:var(--primary);background:var(--primary-soft);padding:3px 10px;border-radius:14px}
.fc-front .term-en{font-size:14px;font-weight:700;color:var(--teal);margin-bottom:8px;letter-spacing:.03em}
.fc-front .term-zh{font-size:30px;font-weight:800;color:var(--ink);line-height:1.3}
.fc-front .hint{position:absolute;bottom:18px;font-size:12px;color:var(--ink-mute)}
.fc-back{background:linear-gradient(150deg,#143a63,#0e7d72); color:#fff; border:1px solid #0c5; transform:rotateY(180deg); border-color:transparent}
.fc-back .lab{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;opacity:.7;margin-bottom:12px}
.fc-back .def{font-size:17px;line-height:1.75;font-weight:500}
.fc-back .src{position:absolute;bottom:18px;font-size:12px;opacity:.7}
.fc-progress{display:flex;align-items:center;justify-content:center;gap:18px;margin-top:22px}
.fc-arrow{width:48px;height:48px;border-radius:50%;border:1.5px solid var(--line);background:#fff;font-size:20px;color:var(--ink-soft);display:grid;place-items:center;transition:.15s}
.fc-arrow:hover{border-color:var(--primary);color:var(--primary);box-shadow:var(--shadow)}
.fc-count{font-size:15px;font-weight:700;color:var(--ink);min-width:74px;text-align:center}
.fc-count span{color:var(--ink-mute);font-weight:500}
.fc-mark{display:flex;gap:10px;justify-content:center;margin-top:16px}
.mk{padding:9px 18px;border-radius:11px;font-size:13.5px;font-weight:700;transition:.14s;border:1.5px solid}
.mk.again{color:var(--amber);border-color:#f3d9a8;background:var(--amber-soft)}
.mk.again:hover{background:#fde9c8}
.mk.know{color:var(--green);border-color:#bbe6c8;background:var(--green-soft)}
.mk.know:hover{background:#d3f0db}
.mk.on{box-shadow:0 0 0 3px rgba(0,0,0,.05)}
.fc-bar{height:6px;background:var(--line);border-radius:6px;overflow:hidden;margin-top:20px;max-width:620px;margin-left:auto;margin-right:auto}
.fc-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--teal));border-radius:6px;transition:width .3s}

/* ---------- Quiz ---------- */
.quiz-intro{text-align:center;padding:14px 0}
.quiz-intro h2{font-size:24px;font-weight:800;margin-bottom:8px}
.quiz-intro p{color:var(--ink-soft);font-size:15px;max-width:560px;margin:0 auto 26px}
.quiz-modes{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;max-width:760px;margin:0 auto}
.qmode{border:1.5px solid var(--line);border-radius:15px;padding:22px 18px;text-align:left;background:#fff;transition:.16s;position:relative;overflow:hidden}
.qmode:hover{border-color:var(--primary);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.qmode .qm-ic{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-size:20px;color:#fff;margin-bottom:13px}
.qmode h3{font-size:16px;font-weight:800;margin-bottom:4px}
.qmode p{font-size:13px;color:var(--ink-mute);margin:0}
.qmode .qm-n{position:absolute;top:18px;right:18px;font-size:13px;font-weight:800;color:var(--ink-mute)}

.quiz-run .q-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.q-counter{font-size:14px;font-weight:700;color:var(--ink-soft)}
.q-chaptag{font-size:12px;font-weight:700;color:var(--primary);background:var(--primary-soft);padding:3px 11px;border-radius:14px}
.q-bar{height:7px;background:var(--line);border-radius:6px;overflow:hidden;margin-bottom:24px}
.q-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--teal));transition:width .35s;border-radius:6px}
.q-stem{font-size:18.5px;font-weight:700;line-height:1.65;margin-bottom:20px;color:var(--ink)}
.q-opts{display:flex;flex-direction:column;gap:11px}
.opt{display:flex;align-items:flex-start;gap:13px;padding:15px 17px;border:1.5px solid var(--line);border-radius:13px;background:#fff;text-align:left;font-size:15px;transition:.14s;width:100%}
.opt:hover:not(.locked){border-color:var(--primary);background:var(--primary-soft)}
.opt .key{width:27px;height:27px;border-radius:8px;background:#eef2f7;color:var(--ink-soft);font-weight:800;font-size:13.5px;display:grid;place-items:center;flex:none;transition:.14s}
.opt:hover:not(.locked) .key{background:var(--primary);color:#fff}
.opt .otext{padding-top:2px;color:var(--ink)}
.opt.locked{cursor:default}
.opt.correct{border-color:var(--green);background:var(--green-soft)}
.opt.correct .key{background:var(--green);color:#fff}
.opt.wrong{border-color:var(--red);background:var(--red-soft)}
.opt.wrong .key{background:var(--red);color:#fff}
.opt .mark{margin-left:auto;font-size:18px;align-self:center}
.q-explain{margin-top:20px;border-radius:13px;padding:16px 18px;font-size:14px;line-height:1.7;display:none;animation:fade .3s}
.q-explain.show{display:block}
.q-explain.ok{background:var(--green-soft);border:1px solid #bbe6c8}
.q-explain.no{background:var(--amber-soft);border:1px solid #f3d9a8}
.q-explain .eh{font-weight:800;margin-bottom:5px;display:flex;align-items:center;gap:7px}
.q-explain.ok .eh{color:#15803d} .q-explain.no .eh{color:#b45309}
.q-explain .et{color:var(--ink-soft)}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.q-foot{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:12px}
.btn-primary{padding:12px 26px;border-radius:12px;background:var(--primary);color:#fff;font-weight:700;font-size:15px;transition:.15s;box-shadow:0 4px 12px rgba(37,99,235,.28)}
.btn-primary:hover{background:var(--primary-d);box-shadow:0 6px 18px rgba(37,99,235,.36)}
.btn-primary:disabled{background:#c3cfe0;box-shadow:none;cursor:default}
.q-quit{font-size:13.5px;color:var(--ink-mute);font-weight:600}
.q-quit:hover{color:var(--red)}

/* result */
.result{text-align:center;padding:10px 0}
.score-ring{width:172px;height:172px;margin:6px auto 18px;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-ring .pct b{font-size:42px;font-weight:800;line-height:1;color:var(--ink)}
.score-ring .pct span{font-size:13px;color:var(--ink-mute);margin-top:4px}
.result h2{font-size:23px;font-weight:800;margin-bottom:6px}
.result .sub{color:var(--ink-soft);margin-bottom:24px}
.result-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
.review{margin-top:30px;text-align:left;border-top:1px solid var(--line-soft);padding-top:22px}
.review h3{font-size:16px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.rv-item{border:1px solid var(--line);border-left:4px solid var(--red);border-radius:11px;padding:14px 16px;margin-bottom:11px;background:#fff}
.rv-item.ok{border-left-color:var(--green)}
.rv-q{font-size:14.5px;font-weight:700;margin-bottom:8px}
.rv-line{font-size:13.5px;margin:2px 0}
.rv-line .lk{font-weight:700}
.rv-yours{color:var(--red)} .rv-correct{color:var(--green);font-weight:700}
.rv-exp{font-size:13px;color:var(--ink-soft);margin-top:7px;padding-top:7px;border-top:1px dashed var(--line)}

/* mobile */
.menu-btn{display:none}
.scrim{display:none}
@media(max-width:920px){
  .wrap{grid-template-columns:1fr; padding:16px}
  aside{position:fixed; top:0; left:0; bottom:0; width:300px; max-height:100vh; z-index:60;
    background:var(--bg); padding:16px; transform:translateX(-105%); transition:transform .26s; box-shadow:var(--shadow-lg)}
  aside.open{transform:translateX(0)}
  .scrim.show{display:block; position:fixed; inset:0; background:rgba(15,23,42,.4); z-index:55}
  .menu-btn{display:inline-grid; place-items:center; position:fixed; left:14px; bottom:18px; z-index:50;
    width:54px;height:54px;border-radius:50%; background:var(--primary); color:#fff; font-size:22px; box-shadow:var(--shadow-lg)}
}
/* phone: 三個分頁改為等寬單行分段控制 */
@media(max-width:600px){
  .top-inner{padding:11px 13px}
  .brand{gap:11px}
  .logo{width:36px;height:36px;font-size:14px;border-radius:9px}
  .brand h1{font-size:16px}
  .brand p{font-size:11px;line-height:1.4}
  .tabs{margin-top:11px; gap:4px; flex-wrap:nowrap;
    background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.16);
    padding:4px; border-radius:13px}
  .tab{flex:1 1 0; min-width:0; justify-content:center; gap:5px;
    padding:10px 4px; font-size:12.5px; border-radius:10px;
    background:transparent; border:none}
  .tab .ic{font-size:14px}
  .tab:hover{background:transparent; color:rgba(255,255,255,.82)}
  .tab.active{background:#fff; color:var(--primary-d); box-shadow:0 2px 7px rgba(0,0,0,.16)}
}
@media(max-width:360px){
  .tab{font-size:11.5px; gap:3px; padding:10px 2px}
  .tab .ic{font-size:13px}
}
.fade-in{animation:pageIn .32s ease}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.foot-note{text-align:center;font-size:12px;color:var(--ink-mute);padding:24px 0 10px;line-height:1.7}
</style>
</head>
<body>
<header class="top">
  <div class="top-inner">
    <div class="brand">
      <div class="logo">AI</div>
      <div>
        <h1>AI 應用規劃師（中級）</h1>
        <p id="subtitle">科目一・人工智慧技術應用規劃　互動學習指引</p>
      </div>
    </div>
    <nav class="tabs" id="tabs">
      <button class="tab active" data-mode="notes"><span class="ic">📘</span>學習筆記</button>
      <button class="tab" data-mode="cards"><span class="ic">🃏</span>重點閃卡</button>
      <button class="tab" data-mode="quiz"><span class="ic">✏️</span>自我測驗</button>
    </nav>
